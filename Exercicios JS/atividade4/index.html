    <h1>Exercício de funções #4</h1>
<script>
/*
Calcule a porcentagem entre 2 números.
Exemplo: 25% de 40 é 10
Fórmula da porcentagem: (y / x) * 100
Uso da função:

let x = 40
let y = 10
let pct = calcPct(x, y);
console.log(${pct}% de ${x} é ${y});
*/

function calcpct(n1, n2) {
    return (n2 / n1) * 100;
}

let x = 40;
let y = 10;
let pct = calcpct(x, y)

console.log(`${pct}% de ${x} é ${y}`)

</script>
