<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picture e Source</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0px;
        }
        img {
            width: 100%;
            height: 100vh;
            object-fit: none;
        }
    </style>
</head>
<body>
    <picture>
        <source media="(min-width: 1024px)" srcset="imagens/Grande.png">
        <source media="(min-width:   768px)" srcset="imagens/Médio.png">
        <img src="imagens/Pequeno.png" alt="pequeno">
    </picture>
</body>
</html>
